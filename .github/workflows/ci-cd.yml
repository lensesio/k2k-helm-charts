name: CI/CD Pipeline

on:
  push:
    branches:
  pull_request:

env:
  HELM_VERSION: '3.18.4'
  KUBECTL_VERSION: '1.32.0'

jobs:
  # Job 1: Test and Package Helm Chart
  test-and-package:
    name: Test & Package Helm Chart
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read
      checks: write
    outputs:
      BRANCH_VERSION: ${{ steps.set-env-vars.outputs.BRANCH_VERSION }}
      BUILD_MODE: ${{ steps.set-env-vars.outputs.BUILD_MODE }}
    container:
      image: alpine/helm:3.18.0
      options: --user root

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apk add --no-cache bash curl git jq

    - name: Setup Helm plugins
      run: |
        helm plugin install https://github.com/helm-unittest/helm-unittest --version main
        helm plugin list

    - name: Set environment variables
      id: set-env-vars
      run: |
        # Branch version is used for private charts
        BRANCH_VERSION=$(echo ${GITHUB_REF_NAME} \
          | tr '[:upper:]' '[:lower:]' \
          | sed 's/[^a-z0-9]/-/g')
        echo "BRANCH_VERSION=$BRANCH_VERSION" | tee -a $GITHUB_ENV $GITHUB_OUTPUT

        if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
          BUILD_MODE=release
        else
          BUILD_MODE=development
        fi
        echo "BUILD_MODE=$BUILD_MODE" | tee -a $GITHUB_ENV $GITHUB_OUTPUT

    - name: Set development chart version
      if: env.BUILD_MODE == 'development'
      run: |
        # Keep major/minor and change patch to: `0-dev-[BRANCH_NAME]`
        sed -i '/^version/s/[^.]*$/'"0-dev-${BRANCH_VERSION}/" ./Chart.yaml
        cat ./Chart.yaml

    - name: Run Helm tests
      run: |
        mkdir -p junit
        if [ -d "./tests" ]; then
          helm unittest \
            --output-file "junit/junit-k2k.xml" \
            --output-type "JUnit" \
            .
        fi

    - name: Run Helm lint
      run: |
        EXTRA_ARGS=""
        if [ -f "./values.test.yaml" ]; then
          EXTRA_ARGS="${EXTRA_ARGS} -f ./values.test.yaml"
        fi
        helm lint . ${EXTRA_ARGS}

    - name: Build Helm dependencies
      # No deps for now, keeping things future-proof
      run: helm dep build .

    - name: Package Helm chart
      run: |
        mkdir -p build
        helm package -d build .
        ls -la build/

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: junit/*.xml
        retention-days: 30

    - name: Upload packaged charts
      uses: actions/upload-artifact@v4
      with:
        name: helm-charts
        path: build/*.tgz
        retention-days: 30

    - name: Publish Test Results
      uses: mikepenz/action-junit-report@v5
      if: success() || failure()
      with:
        report_paths: junit/*.xml
        detailed_summary: true
        include_passed: true
        check_name: Helm Unit Test Results

  # Job 2: Publish to JFrog Artifactory
  publish-to-artifactory:
    name: Publish to JFrog Artifactory
    needs: test-and-package
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    env:
      JFROG_URL: ${{ vars.JFROG_URL }}
      JFROG_PUBLIC_LENSES_HELM_CHARTS: ${{ vars.JFROG_PUBLIC_LENSES_HELM_CHARTS }}
      JFROG_PRIVATE_LENSES_HELM_CHARTS: ${{ vars.JFROG_PRIVATE_LENSES_HELM_CHARTS }}
    permissions:
      id-token: write
      contents: read
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download packaged charts
      uses: actions/download-artifact@v4
      with:
        name: helm-charts
        path: build/

    - name: Set environment variables
      run: |
        echo "BRANCH_VERSION=${{ needs.test-and-package.outputs.BRANCH_VERSION}}" >> $GITHUB_ENV
        echo "BUILD_MODE=${{ needs.test-and-package.outputs.BUILD_MODE}}" >> $GITHUB_ENV

    - name: Setup JFrog CLI
      uses: jfrog/setup-jfrog-cli@v4
      env:
        JF_URL: ${{ env.JFROG_URL }}
      with:
        oidc-provider-name: lensesiodev-github-actions

    - name: Upload to public JFrog repo
      if: env.BUILD_MODE == 'release'
      run: |
        cd build
        for chart in *.tgz; do
          jf rt u "${chart}" ${JFROG_PUBLIC_LENSES_HELM_CHARTS}/
        done

    - name: Upload to private JFrog repo
      run: |
        cd build
        for chart in *.tgz; do
          jf rt u "${chart}" ${JFROG_PRIVATE_LENSES_HELM_CHARTS}/
        done

  # Job 3: Build Static Site Assets
  build-static-site:
    name: Build Static Site Assets
    needs:
      - test-and-package
      - publish-to-artifactory
    runs-on: ubuntu-latest
    container:
      image: alpine/helm:3.18.0
      options: --user root
    env:
      JFROG_URL: ${{ vars.JFROG_URL }}
      JFROG_PUBLIC_MERGED_HELM_CHARTS: ${{ vars.JFROG_PUBLIC_MERGED_HELM_CHARTS }}
    if: |
      github.event_name == 'push' &&
      needs.test-and-package.outputs.BUILD_MODE == 'release'
    permissions:
      id-token: write
      contents: read
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: apk add --no-cache bash curl git jq

    - name: Set environment variables
      run: |
        BRANCH_VERSION="${{ needs.test-and-package.outputs.BRANCH_VERSION }}"
        BUILD_MODE="${{ needs.test-and-package.outputs.BUILD_MODE }}"
        echo "BRANCH_VERSION=$BRANCH_VERSION" >> $GITHUB_ENV
        echo "BUILD_MODE=$BUILD_MODE" >> $GITHUB_ENV

        if [[ "$BUILD_MODE" == release ]]; then
          echo "SOURCE_HELM_REPO_URL=$JFROG_URL/artifactory/$JFROG_PUBLIC_MERGED_HELM_CHARTS/" >> $GITHUB_ENV
          echo "TARGET_HELM_REPO_URL=https://helm.repo.lenses.io" >> $GITHUB_ENV
        else
          echo "Should never reached here"
          exit 1
        fi

    - name: Setup JFrog CLI
      uses: jfrog/setup-jfrog-cli@v4
      env:
        JF_URL: ${{ env.JFROG_URL }}
      with:
        oidc-provider-name: lensesiodev-github-actions

    - name: Authenticate Helm and add Repo
      run: |
        jf rt ping
        JFROG_USER=$(jf config ex | base64 -d | jq -r .user)
        jf config ex | base64 -d | jq -r .accessToken \
          | helm repo add ephemeral "${SOURCE_HELM_REPO_URL}" \
                 --username $JFROG_USER --password-stdin

    - name: Clone site assets
      run: |
        mkdir -p charts
        cd charts
        # Update Helm repository
        helm repo update
        # Copy index.yaml
        eval "$(helm env)"
        cp "${HELM_CACHE_HOME}/repository/ephemeral-index.yaml" index.yaml
        # Replace URLs in index.yaml
        sed "s|${JFROG_URL}.*/|${TARGET_HELM_REPO_URL}/|g" -i index.yaml
        cat index.yaml
        # Pull all chart versions
        CHARTS="$(helm search repo ephemeral ${SEARCH_ARGS} | grep "ephemeral/" | awk '{print $1}')"
        for chart in $CHARTS; do
          CHART_VERSIONS="$(helm search repo "${chart}" --versions ${SEARCH_ARGS} | grep "ephemeral/" | awk '{print $2}')"
          for version in $CHART_VERSIONS; do
            echo "Pulling ${chart}:${version}"
            helm pull "${chart}" --version "${version}" || echo "Pulling ${chart}:${version} FAILED!"
          done
        done
        echo "=== Total files pulled: $(find . | wc -l)"
        ls -la
        cd ..
        tar czf charts.tgz charts

    - name: Upload static site assets
      uses: actions/upload-artifact@v4
      with:
        name: static-site-assets
        path: charts.tgz
        retention-days: 30

  # Job 4: Deploy Static Site
  deploy-static-site:
    name: Deploy Static Site
    needs:
      - test-and-package
      - build-static-site
    runs-on: ubuntu-latest
    # The legacy VM (ans-ci-backend-eu-01) is being retired (OPS-2624) and is now served
    # in parallel by Cloud Run. This push is a best-effort fallback: the "Deploy" step
    # bounds each remote call with `timeout` and always exits 0, so a stalled IAP scp
    # never reddens the release. continue-on-error + this generous job timeout are only a
    # catastrophic backstop (the step-level timeouts fire well before it).
    continue-on-error: true
    timeout-minutes: 15
    env:
      GCP_PROJECT_CI: ${{ vars.GCP_PROJECT_CI }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SA_ACCOUNT: ${{ vars.GCP_SA_ACCOUNT }}
      GCP_SERVER_ZONE: ${{ vars.GCP_SERVER_ZONE }}
      GCP_PROJECT_SERVER: ${{ vars.GCP_PROJECT_SERVER }}
      GCP_SERVER_SSH: ${{ vars.GCP_SERVER_SSH }}
    permissions:
      id-token: write # for workload federation
      contents: read
      actions: read
    if: |
      github.event_name == 'push' &&
      needs.test-and-package.outputs.BUILD_MODE == 'release'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download static site assets
      uses: actions/download-artifact@v4
      with:
        name: static-site-assets
        path: .

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.ANS_CI_BACKEND_01_JENKINS_SSH_KEY }}" > ~/.ssh/id_rsa
        echo "${{ vars.ANS_CI_BACKEND_01_JENKINS_SSH_KEY_PUB }}" > ~/.ssh/id_rsa.pub
        chmod 600 ~/.ssh/id_rsa

    - name: Authenticate to Google Cloud
      id: gcp-auth
      uses: google-github-actions/auth@v2
      with:
        project_id: ${{ env.GCP_PROJECT_CI }}
        workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        token_format: access_token
        service_account: ${{ env.GCP_SA_ACCOUNT }}

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'
      with:
        # Pin gcloud to 566.0.0 (released 2026-04-28) — the version in use on the last run
        # this job is known to have succeeded (2026-04-29). Newer gcloud regressed
        # `compute scp --tunnel-through-iap`, which stalls indefinitely on transfers larger
        # than ~15KB (reported upstream, root cause unfixed). Unpin once the legacy VM is
        # decommissioned (OPS-2624) or the upstream regression is resolved.
        version: '566.0.0'

    - name: Deploy to production website (best-effort)
      # Best-effort push to the legacy VM (OPS-2624). Each remote call is bounded with
      # `timeout` and the step always exits 0, so an IAP scp stall degrades to a skipped
      # fallback (with a warning) rather than a cancelled/failed release. The charts are
      # already served by Cloud Run regardless.
      run: |
        set +e
        # Remote path, we do not clean it because we only add and update files
        REMOTE_PATH="/mnt/persistent/helm.repo.lenses.io"
        # SSH and SCP base commands.
        # --scp-flag=-O forces scp's legacy transfer protocol (kept as a harmless
        # best-effort; on its own it did not resolve the IAP tunnel stall — see OPS-2624).
        SSH_COMMAND="gcloud compute ssh --zone ${GCP_SERVER_ZONE} --project ${GCP_PROJECT_SERVER} --tunnel-through-iap --ssh-key-file=~/.ssh/id_rsa ${GCP_SERVER_SSH}"
        SCP_COMMAND="gcloud compute scp --scp-flag=-O --zone ${GCP_SERVER_ZONE} --project ${GCP_PROJECT_SERVER} --tunnel-through-iap --ssh-key-file=~/.ssh/id_rsa"

        tar xzf charts.tgz

        ok=1
        # Create remote directory
        timeout -k 30 120 $SSH_COMMAND --command="mkdir -p ${REMOTE_PATH}" || ok=0
        # Copy files
        if [ "$ok" = 1 ]; then
          ( cd charts && timeout -k 30 300 $SCP_COMMAND --recurse . ${GCP_SERVER_SSH}:${REMOTE_PATH} ) || ok=0
        fi
        # List deployed files
        if [ "$ok" = 1 ]; then
          timeout -k 30 60 $SSH_COMMAND --command="ls -lsa ${REMOTE_PATH}" || ok=0
        fi

        if [ "$ok" = 1 ]; then
          echo "Legacy VM publish succeeded."
        else
          echo "::warning title=Legacy VM publish skipped::Best-effort push to ${GCP_SERVER_SSH} failed or timed out (IAP scp stall, OPS-2624). Charts are already served by Cloud Run; not failing the release."
        fi
        exit 0

  # Job 5: Build Docker Image
  build-docker-image:
    name: Build Docker Image
    needs:
      - test-and-package
      - build-static-site
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_CI: ${{ vars.GCP_PROJECT_CI }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SA_ACCOUNT: ${{ vars.GCP_SA_ACCOUNT }}
    permissions:
      id-token: write # for workload federation
      contents: read
      actions: read
    if: |
      github.event_name == 'push' &&
      needs.test-and-package.outputs.BUILD_MODE == 'release'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download static site assets
      uses: actions/download-artifact@v4
      with:
        name: static-site-assets
        path: .ci/docker/

    - name: Authenticate to Google Cloud
      id: gcp-auth
      uses: google-github-actions/auth@v2
      with:
        project_id: ${{ env.GCP_PROJECT_CI }}
        workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        token_format: access_token
        service_account: ${{ env.GCP_SA_ACCOUNT }}

    - name: Login to Google Cloud Registry
      uses: docker/login-action@v3
      with:
        username: oauth2accesstoken
        password: ${{ steps.gcp-auth.outputs.access_token }}
        registry: eu.gcr.io

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      run: |
        # Set variables
        BUILD_INFO="GIT_COMMIT=${GITHUB_SHA}\nGIT_BRANCH=${GITHUB_REF_NAME}"
        DOCKER_IMAGE="eu.gcr.io/${GCP_PROJECT_CI}/lenses-helm-chart-repo:${GITHUB_SHA}"
        # Prepare the build
        pushd .ci/docker
        tar xf charts.tgz
        echo -e "${BUILD_INFO}" > build.info
        # Build and push
        docker buildx build \
          --build-arg BUILD_INFO="${BUILD_INFO}" \
          --tag "${DOCKER_IMAGE}" \
          --push \
          .
        echo "Docker image built and pushed: ${DOCKER_IMAGE}"

  # Job 6: Deploy to Cloud Run (OPS-2624)
  # Deploys the snapshot image to the helm-repo service serving
  # helm.repo.lenses.io / helm-origin.repo.lenses.io. Runs alongside the VM
  # scp deploy (Job 4) until the legacy VM is decommissioned.
  deploy-to-cloud-run:
    name: Deploy to Cloud Run
    needs:
      - test-and-package
      - build-docker-image
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_CI: ${{ vars.GCP_PROJECT_CI }}
    permissions:
      id-token: write # for workload federation
      contents: read
    if: |
      github.event_name == 'push' &&
      needs.test-and-package.outputs.BUILD_MODE == 'release'

    steps:
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        project_id: lensesio-production-public
        workload_identity_provider: projects/835207595494/locations/global/workloadIdentityPools/gh-lensesio-dev/providers/github
        service_account: github-actions@lensesio-production-public.iam.gserviceaccount.com

    - name: Deploy snapshot image to helm-repo
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        project_id: lensesio-production-public
        region: europe-west1
        service: helm-repo
        image: eu.gcr.io/${{ env.GCP_PROJECT_CI }}/lenses-helm-chart-repo:${{ github.sha }}

  # # Job 7: Deploy to Kubernetes via ArgoCD
  # # TODO
  # deploy-to-kubernetes:
  #   name: Deploy to Kubernetes
  #   needs: build-docker-image
  #   runs-on: ubuntu-latest
