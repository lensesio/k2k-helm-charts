suite: test offset mapper serviceaccount
templates:
  - offset-mapper-serviceaccount.yaml
tests:
  - it: should not render when offsetMapper is disabled
    set:
      offsetMapper:
        enabled: false
        serviceAccount:
          create: true
          name: om-sa
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render with default values
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when enabled but serviceAccount.create is false
    set:
      offsetMapper:
        enabled: true
        serviceAccount:
          create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when enabled and serviceAccount.create is true
    set:
      offsetMapper:
        enabled: true
        serviceAccount:
          create: true
          name: om-sa
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: apiVersion
          value: v1
      - equal:
          path: metadata.name
          value: om-sa

  - it: should set correct labels
    set:
      offsetMapper:
        enabled: true
        serviceAccount:
          create: true
          name: om-sa
    asserts:
      - equal:
          path: metadata.labels.app
          value: RELEASE-NAME-k2k-offset-mapper
      - matchRegex:
          path: metadata.labels.chart
          pattern: ^k2k-\d+\.\d+\.\d+.*$
      - equal:
          path: metadata.labels.release
          value: RELEASE-NAME
      - equal:
          path: metadata.labels.heritage
          value: Helm
      - equal:
          path: metadata.labels["lenses.io/app"]
          value: RELEASE-NAME-k2k-offset-mapper
      - equal:
          path: metadata.labels["lenses.io/app.type"]
          value: k2k-offset-mapper-serviceaccount

  - it: should add annotations when specified
    set:
      offsetMapper:
        enabled: true
        serviceAccount:
          create: true
          name: om-sa
          annotations:
            "eks.amazonaws.com/role-arn": "arn:aws:iam::123456789012:role/om-role"
    asserts:
      - isNotNull:
          path: metadata.annotations
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789012:role/om-role"

  - it: should not have annotations section when none specified
    set:
      offsetMapper:
        enabled: true
        serviceAccount:
          create: true
          name: om-sa
    asserts:
      - isNull:
          path: metadata.annotations

  - it: should work with fullnameOverride
    set:
      fullnameOverride: custom-app
      offsetMapper:
        enabled: true
        serviceAccount:
          create: true
          name: custom-om-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-om-sa
      - equal:
          path: metadata.labels.app
          value: custom-app-offset-mapper
