suite: test offset mapper service
templates:
  - offset-mapper-service.yaml
tests:
  - it: should not render when offsetMapper is disabled
    set:
      offsetMapper:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render with default values (disabled by default)
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when enabled but service is disabled
    set:
      offsetMapper:
        enabled: true
        service:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render service when enabled
    set:
      offsetMapper:
        enabled: true
        service:
          enabled: true
    asserts:
      - isKind:
          of: Service
      - equal:
          path: apiVersion
          value: v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-k2k-offset-mapper
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.selector.app
          value: RELEASE-NAME-k2k-offset-mapper

  - it: should set custom service type
    set:
      offsetMapper:
        enabled: true
        service:
          enabled: true
          type: LoadBalancer
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer

  - it: should configure service port from otel config
    set:
      offsetMapper:
        enabled: true
        service:
          enabled: true
        otelConfig:
          prometheusPort: 9091
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 9091
      - equal:
          path: spec.ports[0].targetPort
          value: 9091
      - equal:
          path: spec.ports[0].protocol
          value: TCP
      - equal:
          path: spec.ports[0].name
          value: metrics

  - it: should set service annotations
    set:
      offsetMapper:
        enabled: true
        service:
          enabled: true
          annotations:
            test: nlb
    asserts:
      - isNotNull:
          path: metadata.annotations
      - equal:
          path: metadata.annotations.test
          value: nlb

  - it: should not have annotations section when none specified
    set:
      offsetMapper:
        enabled: true
        service:
          enabled: true
    asserts:
      - isNull:
          path: metadata.annotations

  - it: should set correct standard labels
    set:
      offsetMapper:
        enabled: true
        service:
          enabled: true
    asserts:
      - equal:
          path: metadata.labels.app
          value: RELEASE-NAME-k2k-offset-mapper
      - matchRegex:
          path: metadata.labels.chart
          pattern: ^k2k-\d+\.\d+\.\d+.*$
      - equal:
          path: metadata.labels.component
          value: "k2k-offset-mapper"
      - equal:
          path: metadata.labels.heritage
          value: Helm
      - equal:
          path: metadata.labels.release
          value: RELEASE-NAME
      - equal:
          path: metadata.labels["lenses.io/app"]
          value: RELEASE-NAME-k2k-offset-mapper
      - equal:
          path: metadata.labels["lenses.io/app.type"]
          value: k2k-offset-mapper-service

  - it: should set custom labels
    set:
      offsetMapper:
        enabled: true
        service:
          enabled: true
        labels:
          environment: production
    asserts:
      - equal:
          path: metadata.labels.environment
          value: production

  - it: should have distinct name from k2k service
    set:
      offsetMapper:
        enabled: true
        service:
          enabled: true
    asserts:
      - notEqual:
          path: metadata.name
          value: RELEASE-NAME-k2k

  - it: should work with fullnameOverride
    set:
      fullnameOverride: custom-app
      offsetMapper:
        enabled: true
        service:
          enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: custom-app-offset-mapper
      - equal:
          path: spec.selector.app
          value: custom-app-offset-mapper
