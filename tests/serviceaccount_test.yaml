suite: test serviceaccount
templates:
  - serviceaccount.yaml
tests:
  - it: should render serviceaccount when create is true
    set:
      serviceAccount.create: true
      serviceAccount.name: k2k-service-account
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: apiVersion
          value: v1
      - equal:
          path: metadata.name
          value: k2k-service-account

  - it: should not render serviceaccount when create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render serviceaccount with default values (create is false)
    asserts:
      - hasDocuments:
          count: 0

  - it: should set correct labels when created
    set:
      serviceAccount.create: true
      serviceAccount.name: test-sa
    asserts:
      - equal:
          path: metadata.labels.app
          value: RELEASE-NAME-k2k
      - matchRegex:
          path: metadata.labels.chart
          # k2k-[version][optional branch name when in development]
          pattern: ^k2k-\d+\.\d+\.\d+.*$
      - equal:
          path: metadata.labels.release
          value: RELEASE-NAME
      - equal:
          path: metadata.labels.heritage
          value: Helm
      - equal:
          path: metadata.labels["lenses.io/app"]
          value: RELEASE-NAME-k2k
      - equal:
          path: metadata.labels["lenses.io/app.type"]
          value: lenses-agent-serviceaccount

  - it: should add annotations when specified
    set:
      serviceAccount.create: true
      serviceAccount.name: test-sa
      serviceAccount.annotations:
        "eks.amazonaws.com/role-arn": "arn:aws:iam::123456789012:role/k2k-role"
        "custom.annotation": "value"
    asserts:
      - isNotNull:
          path: metadata.annotations
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789012:role/k2k-role"
      - equal:
          path: metadata.annotations["custom.annotation"]
          value: "value"

  - it: should not have annotations section when none specified
    set:
      serviceAccount.create: true
      serviceAccount.name: test-sa
    asserts:
      - isNull:
          path: metadata.annotations

  - it: should work with fullnameOverride
    set:
      serviceAccount.create: true
      serviceAccount.name: custom-sa
      fullnameOverride: custom-k2k-app
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa
      - equal:
          path: metadata.labels.app
          value: custom-k2k-app
