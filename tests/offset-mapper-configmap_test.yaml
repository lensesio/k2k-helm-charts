suite: test offset mapper configmap
templates:
  - offset-mapper-configmap.yaml
tests:
  - it: should not render when offsetMapper is disabled
    set:
      offsetMapper:
        enabled: false
        overrideConfig:
          someKey: someValue
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render with default values
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when enabled but overrideConfig is empty
    set:
      offsetMapper:
        enabled: true
        overrideConfig: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when enabled and overrideConfig is set
    set:
      offsetMapper:
        enabled: true
        overrideConfig:
          source:
            kafka:
              connection:
                servers: "override-kafka:9092"
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: apiVersion
          value: v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-k2k-offset-mapper
      - isNotEmpty:
          path: data

  - it: should have correct labels
    set:
      offsetMapper:
        enabled: true
        overrideConfig:
          key: value
    asserts:
      - equal:
          path: metadata.labels.app
          value: RELEASE-NAME-k2k-offset-mapper
      - matchRegex:
          path: metadata.labels.chart
          pattern: ^k2k-\d+\.\d+\.\d+.*$
      - equal:
          path: metadata.labels.component
          value: "k2k-offset-mapper"
      - equal:
          path: metadata.labels["lenses.io/app"]
          value: RELEASE-NAME-k2k-offset-mapper
      - equal:
          path: metadata.labels["lenses.io/app.type"]
          value: k2k-offset-mapper-configmap

  - it: should have distinct name from k2k configmap
    set:
      offsetMapper:
        enabled: true
        overrideConfig:
          key: value
    asserts:
      - notEqual:
          path: metadata.name
          value: RELEASE-NAME-k2k

  - it: should work with fullnameOverride
    set:
      fullnameOverride: custom-app
      offsetMapper:
        enabled: true
        overrideConfig:
          key: value
    asserts:
      - equal:
          path: metadata.name
          value: custom-app-offset-mapper
