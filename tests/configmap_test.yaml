suite: test configmap
templates:
  - configmap.yaml
tests:
  - it: should render configmap with realistic k2k config
    set:
      k2k:
        replicationConfig:
          name: "k2k-test"
          license:
            acceptEula: true
            token: "test-token"
          source:
            kafka:
              connection:
                servers: "kafka:9092"
          target:
            kafka:
              connection:
                servers: "target:9092"
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: apiVersion
          value: v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-k2k
      - equal:
          path: metadata.labels.app
          value: RELEASE-NAME-k2k
      - matchRegex:
          path: metadata.labels.chart
          # k2k-[version][optional branch name when in development]
          pattern: ^k2k-\d+\.\d+\.\d+.*$
      - equal:
          path: metadata.labels.component
          value: "lenses-kafka2kafka"
      - isNotEmpty:
          path: data
      - isNotNull:
          path: data

  # Make sure we do not set anything in the K2K config
  - it: should render config with empty replication config
    set:
      k2k:
        replicationConfig: {}
    asserts:
      - isKind:
          of: ConfigMap
      - isNotEmpty:
          path: data

  - it: should use custom release name
    release:
      name: my-release
    set:
      k2k:
        replicationConfig:
          name: "test"
    asserts:
      - equal:
          path: metadata.name
          value: my-release-k2k
      - equal:
          path: metadata.labels.release
          value: my-release

  - it: should use fullnameOverride
    set:
      fullnameOverride: custom-configmap-name
      k2k:
        replicationConfig:
          name: "test"
    asserts:
      - equal:
          path: metadata.name
          value: custom-configmap-name

  - it: should set lenses.io labels correctly
    set:
      k2k:
        replicationConfig:
          name: "test"
    asserts:
      - equal:
          path: metadata.labels["lenses.io/app"]
          value: RELEASE-NAME-k2k
      - equal:
          path: metadata.labels["lenses.io/app.type"]
          value: k2k-configmap
