suite: test offset mapper deployment
templates:
  - offset-mapper-deployment.yaml
set:
  k2k:
    replicationConfig:
      name: "k2k-test"
      source:
        kafka:
          connection:
            servers: "kafka:9092"
      license:
        acceptEula: true
        token: "test-token"
tests:
  - it: should not render when offsetMapper is disabled
    set:
      offsetMapper:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render with default values (disabled by default)
    asserts:
      - hasDocuments:
          count: 0

  - it: should render deployment when enabled
    set:
      offsetMapper:
        enabled: true
        deployment:
          resources:
            limits:
              memory: "2Gi"
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: apiVersion
          value: apps/v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-k2k-offset-mapper
      - equal:
          path: spec.replicas
          value: 1

  - it: should use correct image
    set:
      offsetMapper:
        enabled: true
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ^cr\.lenses\.io/lensesio/k2k-offset-mapper:\d+\.\d+.*$

  - it: should use correct container name
    set:
      offsetMapper:
        enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: k2k-offset-mapping

  - it: should set custom image tag
    set:
      offsetMapper:
        enabled: true
        image:
          tag: "2.0.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: cr.lenses.io/lensesio/k2k-offset-mapper:2.0.0

  - it: should not prepend the registry when repository already has a host
    set:
      offsetMapper:
        enabled: true
        image:
          repository: myregistry.internal/lensesio/k2k-offset-mapper
          tag: "2.0.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: myregistry.internal/lensesio/k2k-offset-mapper:2.0.0

  - it: should have correct command without override config
    set:
      offsetMapper:
        enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - k2k-offset-mapping
            - start
            - -f
            - /etc/config/base/config.yaml
            - -g
            - enabled
            - -t

  - it: should have correct command with override config
    set:
      offsetMapper:
        enabled: true
        overrideConfig:
          someKey: someValue
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - k2k-offset-mapping
            - start
            - -f
            - /etc/config/base/config.yaml
            - -f
            - /etc/config/override/override.yaml
            - -g
            - enabled
            - -t

  - it: should mount k2k configmap as base config
    set:
      offsetMapper:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: base-config
            configMap:
              name: RELEASE-NAME-k2k
              items:
                - key: config.yaml
                  path: config.yaml
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: base-config
            mountPath: /etc/config/base

  - it: should not mount override config when not specified
    set:
      offsetMapper:
        enabled: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: override-config
            mountPath: /etc/config/override

  - it: should mount override config when specified
    set:
      offsetMapper:
        enabled: true
        overrideConfig:
          someKey: someValue
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: override-config
            configMap:
              name: RELEASE-NAME-k2k-offset-mapper
              items:
                - key: override.yaml
                  path: override.yaml
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: override-config
            mountPath: /etc/config/override

  - it: should set custom replicas
    set:
      offsetMapper:
        enabled: true
        deployment:
          replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should set resource requests and limits
    set:
      offsetMapper:
        enabled: true
        deployment:
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "200m"
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: "512Mi"
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 1
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: "2Gi"

  - it: should set OTEL environment variables
    set:
      offsetMapper:
        enabled: true
        otelConfig:
          serviceName: "my-offset-mapper"
          metricsExporter: "otlp"
          tracesExporter: "jaeger"
          logsExporter: "otlp"
          prometheusHost: "127.0.0.1"
          prometheusPort: 9091
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_SERVICE_NAME
            value: "my-offset-mapper"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_METRICS_EXPORTER
            value: "otlp"

  - it: should set JAVA_OPTS to 70% for 1Gi memory
    set:
      offsetMapper:
        enabled: true
        deployment:
          resources:
            limits:
              memory: "1Gi"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: JAVA_OPTS
            value: "-XX:MaxRAMPercentage=70.0"

  - it: should set JAVA_OPTS to 85% for 3Gi memory
    set:
      offsetMapper:
        enabled: true
        deployment:
          resources:
            limits:
              memory: "3Gi"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: JAVA_OPTS
            value: "-XX:MaxRAMPercentage=85.0"

  - it: should apply custom labels
    set:
      offsetMapper:
        enabled: true
        labels:
          environment: staging
          team: platform
    asserts:
      - equal:
          path: metadata.labels.environment
          value: staging
      - equal:
          path: metadata.labels.team
          value: platform

  - it: should apply custom annotations
    set:
      offsetMapper:
        enabled: true
        annotations:
          description: "Offset Mapper deployment"
    asserts:
      - equal:
          path: metadata.annotations.description
          value: "Offset Mapper deployment"

  - it: should set node selector
    set:
      offsetMapper:
        enabled: true
        nodeSelector:
          disktype: ssd
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd

  - it: should set affinity
    set:
      offsetMapper:
        enabled: true
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: topology.kubernetes.io/zone
                      operator: In
                      values:
                        - us-east-1a
    asserts:
      - isNotEmpty:
          path: spec.template.spec.affinity

  - it: should set tolerations
    set:
      offsetMapper:
        enabled: true
        tolerations:
          - key: "dedicated"
            operator: "Equal"
            value: "k2k"
            effect: "NoSchedule"
    asserts:
      - isNotEmpty:
          path: spec.template.spec.tolerations

  - it: should set security context
    set:
      offsetMapper:
        enabled: true
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1000

  - it: should use custom service account
    set:
      offsetMapper:
        enabled: true
        serviceAccount:
          name: om-service-account
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: om-service-account

  - it: should use default Recreate strategy when not specified
    set:
      offsetMapper:
        enabled: true
    asserts:
      - equal:
          path: spec.strategy.type
          value: "Recreate"

  - it: should enable liveness probe when configured
    set:
      offsetMapper:
        enabled: true
        livenessProbe:
          enabled: true
        otelConfig:
          prometheusPort: 9091
    asserts:
      - isNotEmpty:
          path: spec.template.spec.containers[0].livenessProbe
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 9091

  - it: should not have liveness probe when disabled
    set:
      offsetMapper:
        enabled: true
        livenessProbe:
          enabled: false
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].livenessProbe

  - it: should render sidecar containers as siblings of the main container
    set:
      offsetMapper:
        enabled: true
        sidecarContainers:
          - name: log-collector
            image: busybox:latest
            command: ["sh", "-c", "tail -f /dev/null"]
    asserts:
      - equal:
          path: spec.template.spec.containers[1].name
          value: log-collector
      - equal:
          path: spec.template.spec.containers[1].image
          value: busybox:latest

  - it: should render init containers
    set:
      offsetMapper:
        enabled: true
        initContainers:
          - name: wait-for-kafka
            image: busybox:latest
            command: ["sh", "-c", "echo ready"]
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-kafka
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: busybox:latest
