suite: test service
templates:
  - service.yaml
tests:
  - it: should render service when enabled
    set:
      service.enabled: true
    asserts:
      - isKind:
          of: Service
      - equal:
          path: apiVersion
          value: v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-k2k
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should not render service when disabled
    set:
      service.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set custom service type
    set:
      service.enabled: true
      service.type: LoadBalancer
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer

  - it: should configure service port from otel config
    set:
      service.enabled: true
      k2k.otelConfig.prometheusPort: 8080
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8080
      - equal:
          path: spec.ports[0].targetPort
          value: 8080
      - equal:
          path: spec.ports[0].protocol
          value: TCP
      - equal:
          path: spec.ports[0].name
          value: metrics

  - it: should set service annotations
    set:
      service.enabled: true
      service.annotations:
        test: nlb
        custom: "value"
    asserts:
      - isNotNull:
          path: metadata.annotations
      - equal:
          path: metadata.annotations.test
          value: nlb
      - equal:
          path: metadata.annotations.custom
          value: "value"

  - it: should not have annotations section when none specified
    set:
      service.enabled: true
    asserts:
      - isNull:
          path: metadata.annotations

  - it: should set correct standard labels
    set:
      service.enabled: true
    asserts:
      - equal:
          path: metadata.labels.app
          value: RELEASE-NAME-k2k
      - matchRegex:
          path: metadata.labels.chart
          # k2k-[version][optional branch name when in development]
          pattern: ^k2k-\d+\.\d+\.\d+.*$
      - equal:
          path: metadata.labels.component
          value: "lenses-kafka2kafka"
      - equal:
          path: metadata.labels.heritage
          value: Helm
      - equal:
          path: metadata.labels.release
          value: RELEASE-NAME
      - equal:
          path: metadata.labels["lenses.io/app"]
          value: RELEASE-NAME-k2k
      - equal:
          path: metadata.labels["lenses.io/app.type"]
          value: k2k-service

  - it: should set custom labels
    set:
      service.enabled: true
      labels:
        environment: production
        team: data
    asserts:
      - equal:
          path: metadata.labels.environment
          value: production
      - equal:
          path: metadata.labels.team
          value: data

  - it: should work with fullnameOverride
    set:
      service.enabled: true
      fullnameOverride: custom-k2k-service
    asserts:
      - equal:
          path: metadata.name
          value: custom-k2k-service

  - it: should use default prometheus port when not specified
    set:
      service.enabled: true
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 9090
      - equal:
          path: spec.ports[0].targetPort
          value: 9090
