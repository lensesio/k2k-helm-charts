service:
  # -- (bool) Deciding factor whether Lenses K2K service will be created and which type
  # @section -- Lenses K2K deployment service values
  enabled: true
  type: ClusterIP

deployment:
  replicas: 1
  #  Resource management
  # -- Pod resources
  # @section -- Custom deployment values
  resources:
    requests:
    #   cpu: 1
      memory: 500Mi
    limits:
    #   cpu: 2
      memory: 1Gi

image:
  repository: lensesio/k2k

k2k:
  otelConfig:
    serviceName: "k2k"
    metricsExporter: "prometheus"
    tracesExporter: "none"
    logsExporter: "none"
    prometheusHost: "0.0.0.0"
#    prometheusPort: "9090"
  replicationConfig:
    name: "k2k-demo-env"
    features:
      exactlyOnce: disabled
      headerReplication: disabled
      schemaMapping: disabled
      optimizeOffsetCommitPartition: enabled
      tracingHeaders: disabled
      autoCreateControlTopics: enabled
      autoCreateTopics: enabled
      validateControlTopicSettings : enabled
      keepRecordCreationTimestamp : enabled
      checkKafkaConnectionOnStartup: enabled
    license:
      acceptEula: <set to true if you accept the EULA>
      token: "<obtain the free license and copy here>"
    source:
      kafka:
        common:
          bootstrap.servers: "localhost:9092"
        consumer:
          group.id: "k2k.eot"
    target:
      kafka:
        common:
          bootstrap.servers: "localhost:9099"
      registry:
        config:
          schema.registry.url: "localhost:8081"
    replication:
      - source:
          name: source
          topic:
            - "airline-customers"
            - "airline-customers-name"
      - sink:
          name: sink-source-topic
          topic:
            prefix: "k2k.eot."
          partition: source
