k2k:
  service:
    enabled: true
    type: ClusterIP

  deployment:
    replicas: 1
    resources:
      requests:
      #   cpu: 1
        memory: 500Mi
      limits:
      #   cpu: 2
        memory: 1Gi

  image:
    repository: lensesio/k2k

  otelConfig:
    serviceName: "k2k"
    metricsExporter: "prometheus"
    tracesExporter: "none"
    logsExporter: "none"
    prometheusHost: "0.0.0.0"
#    prometheusPort: "9090"

  replicationConfig:
    name: "k2k-demo-env"
    features:
      exactlyOnce: disabled
      headerReplication: disabled
      schemaMapping: disabled
      optimizeOffsetCommitPartition: enabled
      tracingHeaders: disabled
      autoCreateControlTopics: enabled
      autoCreateTopics: enabled
      validateControlTopicSettings : enabled
      keepRecordCreationTimestamp : enabled
      checkKafkaConnectionOnStartup: enabled
    license:
      acceptEula: <set to true if you accept the EULA>
      token: "<obtain the free license and copy here>"
    source:
      kafka:
        common:
          bootstrap.servers: "localhost:9092"
        consumer:
          group.id: "k2k.eot"
    target:
      kafka:
        common:
          bootstrap.servers: "localhost:9099"
      registry:
        config:
          schema.registry.url: "localhost:8081"
    replication:
      - source:
          name: source
          topic:
            - "airline-customers"
            - "airline-customers-name"
      - sink:
          name: sink-source-topic
          topic:
            prefix: "k2k.eot."
          partition: source
