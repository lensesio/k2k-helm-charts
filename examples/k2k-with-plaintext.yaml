service:
  # -- (bool) Deciding factor whether Lenses HQ service will be created and which type
  # @section -- Lenses HQ deployment service values
  enabled: true
  type: ClusterIP

deployment:
  replicas: 1
  #  Resource management
  # -- Pod resources
  # @section -- Custom deployment values
  resources:
    requests:
    #   cpu: 1
      memory: 500Mi
    limits:
    #   cpu: 2
      memory: 1Gi

image:
  repository: lensting/k2k

k2k:
  otelConfig:
    serviceName: "k2k"
    metricsExporter: "prometheus"
    tracesExporter: "none"
    logsExporter: "none"
    prometheusHost: "0.0.0.0"
#    prometheusPort: "9090"
  replicationConfig:
    name: "k2k-demo-env"
    features:
      exactlyOnce: disabled
      headerReplication: disabled
      schemaMapping: disabled
      offsetCommitOptimizePartition: enabled
      tracingHeaders: disabled
      autoCreateControlTopics: enabled
      autoCreateTopics: enabled
    license:
      acceptEULA: <set to true if you accept the EULA>
      token: "<obtain the free license and copy here>"
    coordination:
      kafka:
        assignment:
          topic: "__k2k-app-eot-assignment"
        commit:
          topic: "__k2k-app-eot-consumer-offsets"
          group: "k2k.eot"
    source:
      kafka:
        consumer:
          "group.id": "k2k.eot"
        connection:
          servers: "your-kafka-cluster:9092"
    target:
      kafka:
        producer:
        connection:
          servers: "your-kafka-cluster:9092"
    replication:
      - source:
          name: source
          topic:
            - "airline-customers"
            - "airline-customers-name"
      - sink:
          name: sink-source-topic
          topic:
            prefix: "k2k.eot."
          partition: source
