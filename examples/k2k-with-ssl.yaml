k2k:
  service:
    enabled: true
    type: ClusterIP

  deployment:
    replicas: 1
    resources:
      requests:
      #   cpu: 1
        memory: 500Mi
      limits:
      #   cpu: 2
        memory: 1Gi

  image:
    repository: lensesio/k2k

  additionalVolumeMounts:
    - name: external-kafka-ca-cert
      mountPath: "/etc/cacert/caroot.pem"
      subPath: "caroot.pem"
    - name: external-kafka-certs-source-all
      mountPath: "/etc/clientcert/source.pem"
      subPath: "source.pem"
    - name: external-kafka-certs-target-all
      mountPath: "/etc/clientcert/target.pem"
      subPath: "target.pem"

  additionalVolumes:
    - name: external-kafka-ca-cert
      secret:
        secretName: external-kafka-ca-cert
    - name: external-kafka-certs-all
      secret:
        secretName: external-kafka-certs-all
    - name: external-kafka-certs-source-all
      secret:
        secretName: external-kafka-certs-taget-all

  additionalEnv:
    - name: SOURCE_SSL_KEY_PASSWORD
      valueFrom:
        secretKeyRef:
          name: source-ssl-key-pwd
          key: password
    - name: TARGET_SSL_KEY_PASSWORD
      valueFrom:
        secretKeyRef:
          name: taget-ssl-key-pwd
          key: password

  otelConfig:
    serviceName: "k2k"
    metricsExporter: "prometheus"
    tracesExporter: "none"
    logsExporter: "none"
    prometheusHost: "0.0.0.0"
#    prometheusPort: "9090"

  replicationConfig:
    name: "k2k-demo-env"
    features:
      exactlyOnce: disabled
      headerReplication: disabled
      schemaMapping: disabled
      optimizeOffsetCommitPartition: enabled
      tracingHeaders: disabled
      autoCreateControlTopics: enabled
      autoCreateTopics: enabled
      validateControlTopicSettings : enabled
      keepRecordCreationTimestamp : enabled
      checkKafkaConnectionOnStartup: enabled
    license:
      acceptEula: <set to true if you accept the EULA>
      token: "<obtain the free license and copy here>"
    source:
      kafka:
        common:
          bootstrap.servers: "localhost:9093"
          security.protocol: "SSL"
          ssl.truststore.type: "PEM"
          ssl.keystore.type: "PEM"
          ssl.truststore.location: "/etc/cacert/caroot.pem"
          ssl.keystore.location: "/etc/clientcert/source.pem"
          ssl.key.password: ${env:string:SOURCE_SSL_KEY_PASSWORD}
        consumer:
          group.id: "k2k.eot"
    target:
      kafka:
        common:
          bootstrap.servers: "localhost:9093"
          sasl.jaas.config: "org.apache.kafka.common.security.plain.PlainLoginModule required username=userName password=pwd;"
          ssl.truststore.type: "PEM"
          ssl.truststore.location: "/etc/cacert/caroot.pem"
          ssl.keystore.type: "PEM"
          ssl.keystore.location: "/etc/clientcert/taget.pem"
          ssl.key.password: ${env:string:TARGET_SSL_KEY_PASSWORD}
          security.protocol: "SSL"
      registry:
        config:
          schema.registry.url: "localhost:8081"
          schema.registry.ssl.truststore.type: "PEM"
          schema.registry.ssl.truststore.location: "/etc/cacert/caroot.pem"
    replication:
      - source:
          name: source
          topic:
            - "airline-customers"
            - "airline-customers-name"
      - sink:
          name: sink-source-topic
          topic:
            prefix: "k2k.eot."
          partition: source
