# @section -- Lenses K2K deployment service values
service:
  # -- (bool) Deciding factor whether Lenses K2K service will be created and which type
  # @section -- Lenses K2K deployment service values
  enabled: true

  # -- (string) Type of service to be created.
  # @section -- Lenses K2K deployment service values
  type: ClusterIP

deployment:
  replicas: 1
  #  Resource management
  # -- Pod resources
  # @section -- Custom deployment values
  resources:
    requests:
    #   cpu: 1
      memory: 500Mi
    limits:
    #   cpu: 2
      memory: 1Gi

image:
  repository: lensesio/k2k

additionalVolumeMounts:
  - name: external-kafka-ca-cert
    mountPath: "/etc/cacert/caroot.pem"
    subPath: "caroot.pem"

additionalVolumes:
  - name: external-kafka-ca-cert
    secret:
      secretName: external-kafka-ca-cert

k2k:
  additionalEnv:
    - name: SASL_JAAS_CONFIG
      valueFrom:
        secretKeyRef:
          name: kafka-jaas-secret
          key: sasl-jaas.conf

  replicationConfig:
    name: "demo-k2k"
    features:
      exactlyOnce: disabled
      headerReplication: disabled
      schemaMapping: disabled
      optimizeOffsetCommitPartition: enabled
      tracingHeaders: disabled
      autoCreateControlTopics: enabled
      autoCreateTopics: enabled
      validateControlTopicSettings : enabled
      keepRecordCreationTimestamp : enabled
      checkKafkaConnectionOnStartup: enabled
    license:
      acceptEula: <set to true if you accept the EULA>
      token: "<obtain the free license and copy here>"
    source:
      kafka:
        common:
          bootstrap.servers: "localhost:9094"
          sasl.mechanism: "PLAIN"
          sasl.jaas.config: ${env:string:SASL_JAAS_CONFIG}
          ssl.truststore.type: "PEM"
          ssl.truststore.location: "/etc/cacert/caroot.pem" # mount your certificate, check additionalVolumes, line 36
          ssl.truststore.password: ${env:string:SSL_TRUSTSTORE_PASSWORD}
          security.protocol: "SASL_SSL"
        consumer:
          group.id: "my-group"
      registry:
        config:
          schema.registry.url: "localhost:8081"
          schema.registry.ssl.truststore.type: "PEM"
          schema.registry.ssl.truststore.location: "/etc/cacert/caroot.pem" # mount your certificate, check additionalVolumes, line 36
    target:
      kafka:
        common:
          bootstrap.servers: "localhost:9094"
          sasl.mechanism: "PLAIN"
          #Example: "org.apache.kafka.common.security.plain.PlainLoginModule required username=userName password=pwd;"
          sasl.jaas.config: ${env:string:SASL_JAAS_CONFIG}
          ssl.truststore.type: "PEM"
          ssl.truststore.location: "/etc/cacert/caroot.pem" # mount your certificate, check additionalVolumes, line 36
          security.protocol: "SASL_SSL"
      registry:
        config:
          schema.registry.url: "localhost:8081"
          schema.registry.ssl.truststore.type: "PEM"
          schema.registry.ssl.truststore.location: "/etc/cacert/caroot.pem" # mount your certificate, check additionalVolumes, line 36
    replication:
      - source:
          name: source                             #required
          topic:                                   #required
            - "airline-customers"
      - sink:
          name: sink                               #required
          partition: source                        #required
          topic:
            prefix: "demo."
            suffix: ".copy"
