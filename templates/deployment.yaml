{{- if and .Values.offsetMapper.enabled (not (and .Values.k2k.replicationConfig.features (eq .Values.k2k.replicationConfig.features.offsetMapping "enabled"))) -}}
  {{- fail "offsetMapper.enabled is true but k2k.replicationConfig.features.offsetMapping is not set to \"enabled\". Both must be configured together." -}}
{{- end -}}
{{- if and (not .Values.offsetMapper.enabled) .Values.k2k.replicationConfig.features (eq .Values.k2k.replicationConfig.features.offsetMapping "enabled") -}}
  {{- fail "k2k.replicationConfig.features.offsetMapping is \"enabled\" but offsetMapper.enabled is not true. Both must be configured together." -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{include "fullname" . | quote}}
  labels:
    app: {{include "fullname" . | quote}}
    {{- include "commonLabels" . | nindent 4 }}
    component: "k2k"
    lenses.io/app: {{include "fullname" .}}
    lenses.io/app.type: k2k-deployment
    {{- range $key, $value := .Values.k2k.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- if .Values.k2k.annotations }}
  annotations:
    {{- range $key, $value := .Values.k2k.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
spec:
  replicas: {{ .Values.k2k.deployment.replicas }}
  selector:
    matchLabels:
      app: {{include "fullname" . | quote}}
  strategy:
    type: {{ default "Recreate" .Values.k2k.strategy.type | quote }}
  template:
    metadata:
      labels:
        app: {{include "fullname" . | quote}}
        component: "k2k"
      annotations:
        checksum/config: {{ .Values.k2k.replicationConfig | toYaml | sha256sum }}
        {{- with .Values.k2k.otelConfig }}
        {{- if eq .metricsExporter "prometheus" }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .prometheusPort }}"
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- end }}
        {{- range $key, $value := .Values.k2k.podTemplateAnnotations }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.k2k.serviceAccount.name }}
      {{- if .Values.k2k.image.imagePullSecrets }}
      imagePullSecrets: {{ .Values.k2k.image.imagePullSecrets | toYaml | nindent 8 }}
      {{- end }}
      {{- if .Values.k2k.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.k2k.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.k2k.affinity }}
      affinity:
        {{- toYaml .Values.k2k.affinity | nindent 8 }}
      {{- end }}
      {{- if .Values.k2k.tolerations }}
      tolerations:
        {{- toYaml .Values.k2k.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.k2k.securityContext }}
      securityContext:
        {{- toYaml .Values.k2k.securityContext | nindent 8 }}
      {{- end }}
      {{- if .Values.k2k.dnsPolicy }}
      dnsPolicy: {{ .Values.k2k.dnsPolicy }}
      {{- end }}
      {{- if .Values.k2k.dnsConfig }}
      dnsConfig:
        {{- toYaml .Values.k2k.dnsConfig | nindent 8 }}
      {{- end }}
      {{- if .Values.k2k.additionalPodSpec }}
      {{- toYaml .Values.k2k.additionalPodSpec | nindent 6 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "k2k.image" . | quote }}
          imagePullPolicy: {{ .Values.k2k.image.pullPolicy }}
          {{- if .Values.k2k.additionalContainerSpec }}
          {{- toYaml .Values.k2k.additionalContainerSpec | nindent 8 }}
          {{- end }}
          {{- if .Values.k2k.containerSecurityContext }}
          securityContext:
            {{- toYaml .Values.k2k.containerSecurityContext | nindent 10 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.k2k.otelConfig.prometheusPort }}
          {{- if .Values.k2k.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.k2k.otelConfig.prometheusPort }}
            initialDelaySeconds: 300
            periodSeconds: 10
          {{- end }}
          command:
            - k2k
            - start
            - -f
            - /etc/config/config.yaml
            - -g
            - enabled
            - --template-engine
            - enabled
            - -t
          env:
            - name: OTEL_SERVICE_NAME
              value: "{{ .Values.k2k.otelConfig.serviceName }}"
            - name: OTEL_METRICS_EXPORTER
              value: "{{ .Values.k2k.otelConfig.metricsExporter }}"
            - name: OTEL_TRACES_EXPORTER
              value: "{{ .Values.k2k.otelConfig.tracesExporter }}"
            - name: OTEL_LOGS_EXPORTER
              value: "{{ .Values.k2k.otelConfig.logsExporter }}"
            - name: OTEL_EXPORTER_PROMETHEUS_HOST
              value: "{{ .Values.k2k.otelConfig.prometheusHost }}"
            - name: OTEL_EXPORTER_PROMETHEUS_PORT
              value: "{{ .Values.k2k.otelConfig.prometheusPort }}"
            {{- $defaultMemoryLimit := "2Gi" }}
            {{- $memoryLimit := .Values.k2k.deployment.resources.limits.memory | default $defaultMemoryLimit }}
            {{- $memoryBytes := 0 }}
            {{- if hasSuffix "Gi" $memoryLimit }}
              {{- $memoryBytes = mulf (trimSuffix "Gi" $memoryLimit | float64) 1073741824 }}
            {{- else if hasSuffix "G" $memoryLimit }}
              {{- $memoryBytes = mulf (trimSuffix "G" $memoryLimit | float64) 1000000000 }}
            {{- else if hasSuffix "Mi" $memoryLimit }}
              {{- $memoryBytes = mulf (trimSuffix "Mi" $memoryLimit | float64) 1048576 }}
            {{- else if hasSuffix "M" $memoryLimit }}
              {{- $memoryBytes = mulf (trimSuffix "M" $memoryLimit | float64) 1000000 }}
            {{- else if hasSuffix "Ki" $memoryLimit }}
              {{- $memoryBytes = mulf (trimSuffix "Ki" $memoryLimit | float64) 1024 }}
            {{- else if hasSuffix "K" $memoryLimit }}
              {{- $memoryBytes = mulf (trimSuffix "K" $memoryLimit | float64) 1000 }}
            {{- else }}
              {{- $memoryBytes = $memoryLimit | float64 }}
            {{- end }}
            {{- if le $memoryBytes 1073741824.0 }}
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=70.0"
            {{- else if le $memoryBytes 1610612736.0 }}
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=75.0"
            {{- else }}
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=85.0"
            {{- end }}
            {{- if .Values.k2k.additionalEnv }}
            {{- toYaml .Values.k2k.additionalEnv | nindent 12 }}
            {{- end }}
          resources:
            requests:
              cpu: {{ .Values.k2k.deployment.resources.requests.cpu | default "500m" }}
              memory: {{ .Values.k2k.deployment.resources.requests.memory | default "1Gi" }}
            limits:
              cpu: {{ .Values.k2k.deployment.resources.limits.cpu | default "1" }}
              memory: {{ .Values.k2k.deployment.resources.limits.memory | default $defaultMemoryLimit }}
          volumeMounts:
            - name: replication-config
              mountPath: /etc/config
            {{- if .Values.k2k.additionalVolumeMounts }}
            {{- toYaml .Values.k2k.additionalVolumeMounts | nindent 12 }}
            {{- end }}
        {{- if .Values.k2k.sidecarContainers }}
        {{- toYaml .Values.k2k.sidecarContainers | nindent 8 }}
        {{- end }}
      volumes:
        - name: replication-config
          configMap:
            name: {{ include "fullname" . | quote }}
            items:
              - key: config.yaml
                path: config.yaml
        {{- if .Values.k2k.additionalVolumes }}
        {{- toYaml .Values.k2k.additionalVolumes | nindent 8 }}
        {{- end }}

      {{- if .Values.k2k.initContainers }}
      initContainers:
      {{- toYaml .Values.k2k.initContainers | nindent 6 }}
      {{- end }}
