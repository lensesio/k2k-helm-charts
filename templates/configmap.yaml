apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fullname" . | quote }}
  labels:
    app: {{ include "fullname" . }}
    {{- include "commonLabels" . | nindent 4 }}
    component: "lenses-kafka2kafka"
    lenses.io/app: {{ include "fullname" . }}
    lenses.io/app.type: k2k-configmap
data:
  config.yaml: |-
{{ .Values.k2k.replicationConfig | toYaml | indent 4 }}
