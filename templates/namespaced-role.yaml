kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "fullname" . }}
    chart: {{ printf "%s-%s" .Chart.Name .Chart.Version }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    lenses.io/app: {{ include "fullname" . }}
    lenses.io/app.type: k2k-ns-role
rules:
- apiGroups: [""]
  resources:
    - configmaps
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
- apiGroups: ["coordination.k8s.io"]
  resources:
    - leases
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
- apiGroups: [""]
  resources:
    - events
  verbs:
    - create
    - patch
- apiGroups: [""]
  resources:
    - configmaps
    - serviceaccounts
    - services
  verbs:
    - create
    - delete
    - get
    - list
    - patch
    - update
    - watch
- apiGroups: [""]
  resources:
    - events
  verbs:
    - create
    - get
    - list
    - patch
    - watch
- apiGroups: ["apps"]
  resources:
    - deployments
  verbs:
    - create
    - delete
    - scale
    - get
    - list
    - patch
    - update
    - watch
- apiGroups: ["authentication.k8s.io"]
  resources:
    - tokenreviews
  verbs:
    - create
- apiGroups: ["authorization.k8s.io"]
  resources:
    - subjectaccessreviews
  verbs:
    - create

---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "fullname" . }}
    chart: {{ printf "%s-%s" .Chart.Name .Chart.Version }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    lenses.io/app: {{ include "fullname" . }}
    lenses.io/app.type: k2k-role-binding
subjects:
  - kind: ServiceAccount
    namespace: {{ .Release.Namespace }}
    name:  {{ .Values.serviceAccount.name }}
roleRef:
  kind: Role
  name: {{ include "fullname" . }}
  apiGroup: rbac.authorization.k8s.io
